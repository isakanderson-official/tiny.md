    <text x="712" y="176">Static HTML</text>
    <text x="712" y="208">Clean URLs</text>
    <text x="712" y="240">No server required</text>
  </g>
  <g fill="none" stroke="#0f766e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 180h46"/>
    <path d="M334 160l20 20-20 20"/>
    <path d="M610 180h46"/>
    <path d="M644 160l20 20-20 20"/>
  </g>
  <g fill="#0f766e">
    <circle cx="170" cy="286" r="8"/>
    <circle cx="480" cy="286" r="8"/>
    <circle cx="790" cy="286" r="8"/>
